<article class="product-card reveal">
  <a href="{{ url_for('public.product_detail', slug=product.slug) }}">
    <img src="{{ product.cover_media_url or product.image_url }}" alt="{{ product.name }}" loading="lazy">
  </a>
  <div>
    {% if product.badges %}
      <div class="badge-row">
        {% for badge in product.badges %}
          <span class="pill">{{ badge }}</span>
        {% endfor %}
      </div>
    {% endif %}
    <h3>{{ product.name }}</h3>
    <p>{{ product.category.name }}</p>
    <div class="card-bottom">
      <div class="price-stack">
        {% if product.has_discount_price %}
          <span class="price-old">Rs. {{ "%.0f"|format(product.original_price) }}</span>
        {% endif %}
        <strong>Rs. {{ "%.0f"|format(product.price) }}</strong>
      </div>
      <a href="{{ url_for('public.product_detail', slug=product.slug) }}">View</a>
    </div>
  </div>
</article>
