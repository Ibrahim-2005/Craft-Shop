{% extends "base.html" %}
{% block content %}
<section class="page-hero">
  <p class="eyebrow">Gallery showcase</p>
  <h1>Finished pieces, pretty corners, gift-day magic.</h1>
</section>
<section class="section masonry gallery-page">
  {% for item in items %}
    <figure>
      <img src="{{ item.image_url }}" alt="{{ item.title }}" loading="lazy">
      <figcaption><strong>{{ item.title }}</strong><span>{{ item.caption }}</span></figcaption>
    </figure>
  {% endfor %}
</section>
{% endblock %}
