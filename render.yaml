services:
  - type: web
    name: curated-by-afza
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && gunicorn wsgi:app
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: AUTO_CREATE_DB
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: curated-by-afza-db
          property: connectionString
databases:
  - name: curated-by-afza-db
    databaseName: gift_studio
    user: gift_studio_user
